<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberTic: Level Master</title>
    
    <meta name="google-adsense-account" content="ca-pub-2021454167052270">
    <meta name="google-site-verification" content="8Zrguc3EHXMbYg20P7UwIGef2ZH6ZlMLqM8OLIOiW3Y" />
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2021454167052270" crossorigin="anonymous"></script>

    <style>
        :root {
            --bg: #0a0a12;
            --card: #161625;
            --accent: #00f2ff;
            --player-x: #ff007b;
            --player-o: #00f2ff; 
            --text: #ffffff;
            --xp-bar: #39ff14;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            min-height: 100vh;
        }

        /* LEVEL SELECTOR STYLES */
        .level-picker {
            display: flex;
            align-items: center;
            gap: 20px;
            margin: 20px 0;
            background: var(--card);
            padding: 10px 25px;
            border-radius: 50px;
            border: 2px solid var(--accent);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
        }

        .nav-btn {
            background: none;
            border: none;
            color: var(--accent);
            font-size: 1.5rem;
            cursor: pointer;
            transition: 0.2s;
            padding: 0 10px;
            margin: 0;
        }

        .nav-btn:disabled { color: #444; cursor: not-allowed; }
        .nav-btn:hover:not(:disabled) { transform: scale(1.3); text-shadow: 0 0 10px var(--accent); }

        #levelNum { font-size: 2rem; font-weight: bold; min-width: 60px; text-align: center; }

        /* PROGRESS & STATS */
        .xp-container { width: 300px; height: 8px; background: #222; border-radius: 4px; margin-bottom: 20px; }
        .xp-fill { height: 100%; width: 1%; background: var(--xp-bar); box-shadow: 0 0 10px var(--xp-bar); transition: 0.5s; }

        .stats { display: flex; gap: 15px; margin-bottom: 20px; }
        .stat-item { background: var(--card); padding: 5px 15px; border-radius: 8px; border: 1px solid #333; font-size: 0.8rem; }

        /* THE BOARD */
        .board { display: grid; grid-template-columns: repeat(3, 90px); gap: 10px; }
        .cell {
            width: 90px; height: 90px; background: var(--card); border: 1px solid #333;
            border-radius: 12px; font-size: 2.5rem; display: flex; align-items: center;
            justify-content: center; cursor: pointer; transition: 0.2s;
        }
        .cell:hover { border-color: var(--accent); box-shadow: 0 0 10px var(--accent); }
        .cell.x { color: var(--player-x); text-shadow: 0 0 10px var(--player-x); }
        .cell.o { color: var(--player-o); text-shadow: 0 0 10px var(--player-o); }
        .winner-cell { animation: pulse 0.6s infinite; border-color: var(--xp-bar) !important; }
        @keyframes pulse { 50% { filter: brightness(1.5); transform: scale(1.05); } }

        .controls { margin-top: 30px; display: flex; gap: 10px; }
        .btn {
            padding: 10px 20px; background: transparent; color: var(--text);
            border: 1px solid var(--text); border-radius: 5px; cursor: pointer; font-weight: bold;
        }
        .btn-primary { border-color: var(--accent); color: var(--accent); }
        .btn:hover { background: rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <h1 style="letter-spacing: 3px; text-shadow: 0 0 10px var(--accent);">CYBERTIC</h1>

    <div class="level-picker">
        <button class="nav-btn" onclick="changeLevel(-1)" id="prevBtn">◂</button>
        <div>
            <span style="display:block; font-size: 0.6rem; color: var(--accent); text-align: center;">LEVEL</span>
            <span id="levelNum">1</span>
        </div>
        <button class="nav-btn" onclick="changeLevel(1)" id="nextBtn">▸</button>
    </div>

    <div class="xp-container">
        <div class="xp-fill" id="xpBar"></div>
    </div>

    <div class="stats">
        <div class="stat-item">Wins: <span id="scoreX">0</span></div>
        <div class="stat-item">CPU: <span id="scoreO">0</span></div>
        <div class="stat-item">AI Power: <span id="diffPerc">1%</span></div>
    </div>

    <p id="status" style="height: 20px; font-weight: bold; color: var(--accent);">READY PLAYER ONE</p>

    <div class="board" id="board">
        <div class="cell" onclick="handleMove(0)"></div>
        <div class="cell" onclick="handleMove(1)"></div>
        <div class="cell" onclick="handleMove(2)"></div>
        <div class="cell" onclick="handleMove(3)"></div>
        <div class="cell" onclick="handleMove(4)"></div>
        <div class="cell" onclick="handleMove(5)"></div>
        <div class="cell" onclick="handleMove(6)"></div>
        <div class="cell" onclick="handleMove(7)"></div>
        <div class="cell" onclick="handleMove(8)"></div>
    </div>

    <div class="controls">
        <button class="btn" onclick="resetBoard()">Restart Level</button>
        <button class="btn btn-primary" onclick="fullReset()">New Game</button>
    </div>

    <script>
        let board = Array(9).fill("");
        let gameActive = true;
        
        // Storage Logic
        let maxUnlockedLevel = parseInt(localStorage.getItem('max_lvl')) || 1;
        let selectedLevel = maxUnlockedLevel;
        let wins = parseInt(localStorage.getItem('biz_wins')) || 0;
        let cpuWins = parseInt(localStorage.getItem('biz_losses')) || 0;

        const cells = document.querySelectorAll(".cell");
        const statusTxt = document.getElementById("status");

        function updateUI() {
            document.getElementById("levelNum").innerText = selectedLevel;
            document.getElementById("scoreX").innerText = wins;
            document.getElementById("scoreO").innerText = cpuWins;
            document.getElementById("xpBar").style.width = (selectedLevel / 100 * 100) + "%";
            document.getElementById("diffPerc").innerText = selectedLevel + "%";
            
            // Disable nav buttons based on progress
            document.getElementById("prevBtn").disabled = (selectedLevel <= 1);
            document.getElementById("nextBtn").disabled = (selectedLevel >= maxUnlockedLevel);
        }

        function changeLevel(delta) {
            let target = selectedLevel + delta;
            if (target >= 1 && target <= maxUnlockedLevel) {
                selectedLevel = target;
                resetBoard();
                updateUI();
                statusTxt.innerText = "LEVEL " + selectedLevel + " LOADED";
            }
        }

        function handleMove(i) {
            if (board[i] !== "" || !gameActive) return;
            board[i] = "X";
            cells[i].innerText = "X";
            cells[i].classList.add("x");
            
            if (checkGameOver("X")) return;
            
            gameActive = false;
            statusTxt.innerText = "CPU COMPUTING...";
            setTimeout(cpuMove, 600);
        }

        function cpuMove() {
            let move;
            // The "Addictive" difficulty scaling
            if (Math.random() < (selectedLevel / 100)) {
                move = getBestMove(); 
            } else {
                let avail = board.map((v, i) => v === "" ? i : null).filter(v => v !== null);
                move = avail[Math.floor(Math.random() * avail.length)];
            }

            if (move !== undefined) {
                board[move] = "O";
                cells[move].innerText = "O";
                cells[move].classList.add("o");
                if (!checkGameOver("O")) {
                    gameActive = true;
                    statusTxt.innerText = "YOUR TURN";
                }
            }
        }

        function checkGameOver(p) {
            const patterns = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            let match = patterns.find(ptrn => ptrn.every(i => board[i] === p));
            
            if (match) {
                if (p === "X") {
                    statusTxt.innerText = "LEVEL COMPLETED!";
                    if (selectedLevel === maxUnlockedLevel && maxUnlockedLevel < 100) {
                        maxUnlockedLevel++;
                        localStorage.setItem('max_lvl', maxUnlockedLevel);
                    }
                    wins++;
                    localStorage.setItem('biz_wins', wins);
                } else {
                    statusTxt.innerText = "SYSTEM FAILURE!";
                    cpuWins++;
                    localStorage.setItem('biz_losses', cpuWins);
                }
                match.forEach(idx => cells[idx].classList.add("winner-cell"));
                gameActive = false;
                updateUI();
                return true;
            }
            if (!board.includes("")) {
                statusTxt.innerText = "DATA DRAW - REPLAY";
                gameActive = false;
                return true;
            }
            return false;
        }

        function resetBoard() {
            board = Array(9).fill("");
            gameActive = true;
            cells.forEach(c => { c.innerText = ""; c.className = "cell"; });
            statusTxt.innerText = "READY PLAYER ONE";
            updateUI();
        }

        function fullReset() {
            if(confirm("Wipe all data and start from Level 1?")) {
                localStorage.clear();
                location.reload();
            }
        }

        // --- AI BRAIN (MINIMAX) ---
        function getBestMove() {
            let bestScore = -Infinity;
            let move;
            for (let i = 0; i < 9; i++) {
                if (board[i] === "") {
                    board[i] = "O";
                    let score = minimax(board, 0, false);
                    board[i] = "";
                    if (score > bestScore) { bestScore = score; move = i; }
                }
            }
            return move;
        }

        function minimax(b, d, isMax) {
            let res = evalB(b);
            if (res !== null) return res;
            if (isMax) {
                let s = -Infinity;
                for (let i=0; i<9; i++) { if(b[i]==="") { b[i]="O"; s=Math.max(s, minimax(b, d+1, false)); b[i]=""; } }
                return s;
            } else {
                let s = Infinity;
                for (let i=0; i<9; i++) { if(b[i]==="") { b[i]="X"; s=Math.min(s, minimax(b, d+1, true)); b[i]=""; } }
                return s;
            }
        }

        function evalB(b) {
            const patterns = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            for (let p of patterns) {
                if (b[p[0]] && b[p[0]] === b[p[1]] && b[p[0]] === b[p[2]]) return b[p[0]] === "O" ? 10 : -10;
            }
            return b.includes("") ? null : 0;
        }
    </script>
</body>
</html>
