<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ByteFix Tic-Tac-Toe Pro</title>
    
    <meta name="google-adsense-account" content="ca-pub-2021454167052270">
    <meta name="google-site-verification" content="8Zrguc3EHXMbYg20P7UwIGef2ZH6ZlMLqM8OLIOiW3Y" />
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2021454167052270" crossorigin="anonymous"></script>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" id="meta-theme" content="#3498db">
    
    <style>
        :root { --bg: #1a1a1a; --card: #2d2d2d; --accent: #3498db; --text: #ffffff; --status: #f1c40f; }
        [data-theme="light"] { --bg: #f0f2f5; --card: #ffffff; --accent: #2980b9; --text: #1a1a1a; --status: #d35400; }
        
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background-color: var(--bg); color: var(--text); padding: 20px; transition: 0.3s; }
        .theme-btn { position: absolute; top: 10px; right: 10px; background: var(--card); color: var(--text); border: 1px solid var(--accent); border-radius: 50%; width: 40px; height: 40px; cursor: pointer; }
        
        .score-board { display: inline-flex; gap: 20px; background: var(--card); padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid var(--accent); }
        .level-badge { color: var(--accent); font-weight: bold; display: block; margin-bottom: 5px; }
        
        .board { display: grid; grid-template-columns: repeat(3, 90px); gap: 10px; justify-content: center; margin: 20px auto; }
        .cell { width: 90px; height: 90px; background-color: var(--card); font-size: 2.5rem; display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        @keyframes popIn { 0% { transform: scale(0); } 80% { transform: scale(1.2); } 100% { transform: scale(1); } }
        .pop { animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .win-anim { animation: winner 0.5s ease infinite; }
        @keyframes winner { 50% { transform: translateY(-5px); color: var(--status); } }
        
        button.main-btn { background: var(--accent); color: white; border: none; padding: 12px 24px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        #status { color: var(--status); height: 1.5em; }
    </style>
</head>
<body data-theme="dark">

    <button class="theme-btn" onclick="toggleTheme()">🌓</button>

    <h1>Tic-Tac-Toe Evolution</h1>

    <div class="score-board">
        <div><span class="level-badge">LEVEL</span><span id="levelDisplay">1</span></div>
        <div><span class="level-badge">YOU (X)</span><span id="scoreX">0</span></div>
        <div><span class="level-badge">AI (O)</span><span id="scoreO">0</span></div>
    </div>

    <h2 id="status">Your Turn!</h2>
    
    <div class="board" id="board">
        <div class="cell" onclick="handleHumanMove(0)"></div>
        <div class="cell" onclick="handleHumanMove(1)"></div>
        <div class="cell" onclick="handleHumanMove(2)"></div>
        <div class="cell" onclick="handleHumanMove(3)"></div>
        <div class="cell" onclick="handleHumanMove(4)"></div>
        <div class="cell" onclick="handleHumanMove(5)"></div>
        <div class="cell" onclick="handleHumanMove(6)"></div>
        <div class="cell" onclick="handleHumanMove(7)"></div>
        <div class="cell" onclick="handleHumanMove(8)"></div>
    </div>

    <button class="main-btn" onclick="resetGame()">Next Round</button>

    <script>
        // --- INITIAL STATE & LOCAL STORAGE ---
        let board = Array(9).fill("");
        let gameActive = true;
        let currentPlayer = "X";
        let currentLevel = parseInt(localStorage.getItem('ttt_level')) || 1;
        let scoreX = parseInt(localStorage.getItem('ttt_scoreX')) || 0;
        let scoreO = parseInt(localStorage.getItem('ttt_scoreO')) || 0;

        document.getElementById("levelDisplay").innerText = currentLevel;
        document.getElementById("scoreX").innerText = scoreX;
        document.getElementById("scoreO").innerText = scoreO;

        const cells = document.querySelectorAll(".cell");
        const statusDisplay = document.getElementById("status");
        const winPatterns = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

        // --- AUDIO ENGINE ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(freq, duration) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }

        // --- THEME ---
        function toggleTheme() {
            const theme = document.body.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
            document.body.setAttribute('data-theme', theme);
            localStorage.setItem('ttt_theme', theme);
        }

        // --- GAMEPLAY ---
        function handleHumanMove(index) {
            if (board[index] !== "" || !gameActive) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            playSound(600, 0.1);
            executeMove(index, "X");

            if (gameActive) {
                statusDisplay.innerText = "AI is thinking...";
                setTimeout(computerMove, 600);
            }
        }

        function computerMove() {
            if (!gameActive) return;
            
            // DIFFICULTY SCALING: Higher level = higher chance of using Minimax
            const difficultyThreshold = currentLevel / 100;
            let moveIndex;

            if (Math.random() < difficultyThreshold) {
                moveIndex = getBestMove(); // Smart move
            } else {
                let available = board.map((v, i) => v === "" ? i : null).filter(v => v !== null);
                moveIndex = available[Math.floor(Math.random() * available.length)]; // Random move
            }

            playSound(400, 0.1);
            executeMove(moveIndex, "O");
        }

        function executeMove(index, player) {
            board[index] = player;
            cells[index].innerText = player;
            cells[index].classList.add("pop");
            checkWin(player);
        }

        function checkWin(player) {
            let win = winPatterns.find(p => p.every(i => board[i] === player));
            if (win) {
                statusDisplay.innerText = player === "X" ? "You Won Level " + currentLevel + "!" : "AI Won!";
                if (player === "X") levelUp();
                else saveScore("O");
                
                win.forEach(i => cells[i].classList.add("win-anim"));
                playSound(player === "X" ? 800 : 200, 0.5);
                gameActive = false;
            } else if (!board.includes("")) {
                statusDisplay.innerText = "Draw! Try again.";
                gameActive = false;
            } else if (player === "O") {
                statusDisplay.innerText = "Your Turn!";
            }
        }

        function levelUp() {
            scoreX++;
            if (currentLevel < 100) currentLevel++;
            localStorage.setItem('ttt_level', currentLevel);
            localStorage.setItem('ttt_scoreX', scoreX);
            document.getElementById("levelDisplay").innerText = currentLevel;
            document.getElementById("scoreX").innerText = scoreX;
        }

        function saveScore(player) {
            scoreO++;
            localStorage.setItem('ttt_scoreO', scoreO);
            document.getElementById("scoreO").innerText = scoreO;
        }

        function resetGame() {
            board = Array(9).fill("");
            gameActive = true;
            statusDisplay.innerText = "Level " + currentLevel + ": Fight!";
            cells.forEach(c => { c.innerText = ""; c.classList.remove("pop", "win-anim"); });
        }

        // --- MINIMAX ALGORITHM (The "Brain") ---
        function getBestMove() {
            let bestScore = -Infinity;
            let move;
            for (let i = 0; i < 9; i++) {
                if (board[i] === "") {
                    board[i] = "O";
                    let score = minimax(board, 0, false);
                    board[i] = "";
                    if (score > bestScore) {
                        bestScore = score;
                        move = i;
                    }
                }
            }
            return move;
        }

        function minimax(currBoard, depth, isMaximizing) {
            let result = evaluate(currBoard);
            if (result !== null) return result;

            if (isMaximizing) {
                let bestScore = -Infinity;
                for (let i = 0; i < 9; i++) {
                    if (currBoard[i] === "") {
                        currBoard[i] = "O";
                        let score = minimax(currBoard, depth + 1, false);
                        currBoard[i] = "";
                        bestScore = Math.max(score, bestScore);
                    }
                }
                return bestScore;
            } else {
                let bestScore = Infinity;
                for (let i = 0; i < 9; i++) {
                    if (currBoard[i] === "") {
                        currBoard[i] = "X";
                        let score = minimax(currBoard, depth + 1, true);
                        currBoard[i] = "";
                        bestScore = Math.min(score, bestScore);
                    }
                }
                return bestScore;
            }
        }

        function evaluate(b) {
            for (let p of winPatterns) {
                if (b[p[0]] && b[p[0]] === b[p[1]] && b[p[0]] === b[p[2]]) {
                    return b[p[0]] === "O" ? 10 : -10;
                }
            }
            return b.includes("") ? null : 0;
        }

        if ('serviceWorker' in navigator) { window.addEventListener('load', () => navigator.serviceWorker.register('sw.js')); }
    </script>
</body>
</html>
